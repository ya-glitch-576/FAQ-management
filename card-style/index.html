<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sun-Net Support - Card</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Noto+Sans+JP:wght@400;700;900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="app-header">
        <div class="header-inner">
            <div class="logo-container">
                <img src="http://sunrise-net.sakura.ne.jp/img/sunnetlogo.png" alt="Logo" class="sun-logo">
                <h1 id="app-title">FAQボット</h1>
            </div>
            <div class="lang-switcher">
                <button id="lang-ja" class="lang-btn active">JP</button>
                <button id="lang-en" class="lang-btn">EN</button>
            </div>
        </div>
        <p class="subtitle" id="app-subtitle">Support Center (Card View)</p>
    </header>

    <main class="container">
        <div id="faq-card" class="faq-card">
            <div class="loading">読み込み中...</div>
        </div>
        <div class="controls">
            <button id="back-button" class="btn-secondary" disabled>← 前に戻る</button>
        </div>
    </main>

    <script src="../data.js"></script>
    <script src="script.js"></script>
</body>

</html>
