<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FAQ Project Portal</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
        }

        h1 {
            font-size: 3rem;
            margin-bottom: 2rem;
            letter-spacing: -0.05em;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 2rem;
            max-width: 900px;
        }

        .card {
            background-color: #1e293b;
            padding: 2.5rem;
            border-radius: 1.5rem;
            text-decoration: none;
            color: white;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #334155;
        }

        .card:hover {
            transform: translateY(-10px);
            background-color: #334155;
            border-color: #60a5fa;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        .card h2 {
            margin: 0;
            font-size: 1.5rem;
        }

        .card p {
            color: #94a3b8;
            margin-top: 1rem;
            font-size: 0.875rem;
        }
    </style>
</head>

<body>
    <h1>FAQ PROJECTS</h1>
    <div class="grid">
        <a href="chat-style/index.html" class="card">
            <h2>💬 Chat Style</h2>
            <p>Interactive chat-based support interface.</p>
        </a>
        <a href="card-style/index.html" class="card">
            <h2>🗂️ Card Style</h2>
            <p>Modern card-based layout for quick browsing.</p>
        </a>
        <a href="site/index.html" class="card">
            <h2>🌐 Full Site</h2>
            <p>Generated static site for broad access.</p>
        </a>
    </div>
</body>

</html>
